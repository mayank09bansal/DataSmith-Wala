services:
  # Backend API - Docker-based
  - type: web
    name: datasmith-wala-api
    env: docker
    rootDir: backend
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: TESSERACT_PATH
        value: /usr/bin/tesseract
      - key: USE_MOCK_LLM
        value: "false"

  # Frontend - Static Site
  - type: web
    name: datasmith-wala-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
